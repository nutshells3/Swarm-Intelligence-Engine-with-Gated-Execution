[package]
name = "scaling"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = []
# Enable NATS JetStream event bus. When disabled (default), NatsEventBus
# delegates all operations to PgEventBus (PG-only fallback mode).
# When the `async-nats` crate is wired in a future milestone, this
# feature flag will control whether the real NATS transport is compiled.
#
# To activate: cargo build -p scaling --features nats
# Then uncomment async-nats below and wire it into NatsEventBus::publish().
nats = []

[dependencies]
# SCL-004: async-nats — uncomment when wiring real NATS JetStream transport.
# The NatsEventBus struct exists and compiles behind the `nats` feature, but
# currently delegates to PgEventBus. Uncomment this line and replace the
# delegation in nats_event_bus.rs with real JetStream publish calls.
# async-nats = { version = "0.38", optional = true }
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "json"] }
thiserror.workspace = true
tokio = { version = "1", features = ["sync", "time", "process", "fs"] }
tracing.workspace = true
uuid.workspace = true
toml.workspace = true

[dependencies.git-control]
path = "../git-control"

[package]
name = "control-plane"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = []
runtime = ["dep:sqlx", "dep:tracing"]

[dependencies]
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
state-model = { path = "../state-model" }
user-policy = { path = "../user-policy" }
worker-protocol = { path = "../worker-protocol" }
skill-registry = { path = "../skill-registry" }
planning-engine = { path = "../planning-engine" }
roadmap-model = { path = "../roadmap-model" }

# Optional runtime dependencies (activated by "runtime" feature)
sqlx = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
